; ============================================================
; NOBLEPORT.COM — CLOUDFLARE DNS ZONE FILE
; Import via: Cloudflare Dashboard → DNS → Import DNS Records
; ============================================================
; IMPORTANT: Replace all placeholder IPs before importing
;   VULTR_GATEWAY_IP  = Your Vultr VPS IP (Gateway Brain)
;   HETZNER_STORAGE_IP = Your Hetzner storage server IP
;   MEDIA_SERVER_IP    = Your media/streaming server IP
;   VERCEL_CNAME       = cname.vercel-dns.com
; ============================================================

$ORIGIN nobleport.com.
$TTL 300

; ── ROOT DOMAIN ──────────────────────────────────────────────
; Option A: Point to VPS directly
@       IN  A       VULTR_GATEWAY_IP
; Option B: Point to Vercel (uncomment if using Vercel for root)
; @     IN  CNAME   cname.vercel-dns.com.

; WWW redirect
www     IN  CNAME   nobleport.com.

; ── APPLICATION SUBDOMAINS ───────────────────────────────────
; Main platform UI (Vercel / Netlify)
app     IN  CNAME   cname.vercel-dns.com.

; Backend API — Gateway Brain (Vultr)
api     IN  A       VULTR_GATEWAY_IP

; DAO governance (Snapshot integration)
dao     IN  CNAME   cname.vercel-dns.com.

; Stephanie.ai live avatar / video streaming
stream  IN  A       MEDIA_SERVER_IP

; Investor portal
invest  IN  CNAME   cname.vercel-dns.com.

; Contractor / GCagent interface
build   IN  CNAME   cname.vercel-dns.com.

; PermitStream interface
permit  IN  CNAME   cname.vercel-dns.com.

; Documentation / compliance portal
docs    IN  CNAME   cname.vercel-dns.com.

; ── INFRASTRUCTURE SUBDOMAINS ────────────────────────────────
; IPFS gateway / pinning service (Hetzner)
ipfs    IN  A       HETZNER_STORAGE_IP

; Monitoring & observability
monitor IN  A       VULTR_GATEWAY_IP

; WebSocket connections (real-time data)
ws      IN  A       VULTR_GATEWAY_IP

; ── EMAIL (REQUIRED FOR SPF/DKIM) ───────────────────────────
; MX records (adjust for your email provider)
@       IN  MX  10  mx1.emailprovider.com.
@       IN  MX  20  mx2.emailprovider.com.

; ── TXT RECORDS — VERIFICATION & SECURITY ────────────────────
; SPF — authorize email senders
@       IN  TXT     "v=spf1 include:_spf.emailprovider.com ~all"

; DKIM — email signing (replace selector and key)
default._domainkey  IN  TXT  "v=DKIM1; k=rsa; p=YOUR_DKIM_PUBLIC_KEY"

; DMARC — email policy
_dmarc  IN  TXT     "v=DMARC1; p=reject; rua=mailto:dmarc@nobleport.com; pct=100"

; ENS domain verification
@       IN  TXT     "ENS1 nobleport.eth"

; Site verification (Google, etc.)
@       IN  TXT     "google-site-verification=YOUR_VERIFICATION_CODE"

; ── CAA RECORDS — SSL CERTIFICATE AUTHORITY ──────────────────
@       IN  CAA  0  issue "letsencrypt.org"
@       IN  CAA  0  issue "digicert.com"
@       IN  CAA  0  issuewild "letsencrypt.org"
@       IN  CAA  0  iodef "mailto:security@nobleport.com"
