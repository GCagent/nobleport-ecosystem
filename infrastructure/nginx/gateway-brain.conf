# ============================================================
# NOBLEPORT GATEWAY BRAIN — Nginx Reverse Proxy Configuration
# Server: Vultr VPS
# ============================================================
# Install: apt install nginx certbot python3-certbot-nginx
# Deploy:  cp gateway-brain.conf /etc/nginx/sites-available/nobleport
#          ln -s /etc/nginx/sites-available/nobleport /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
#          certbot --nginx -d nobleport.com -d *.nobleport.com
# ============================================================

# ── Rate Limiting Zones ─────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/s;
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

# ── Upstream Services ────────────────────────────────────────
upstream gateway_brain {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream stephanie_stream {
    server 127.0.0.1:8081;
    keepalive 16;
}

upstream websocket_service {
    server 127.0.0.1:8082;
    keepalive 64;
}

# ── HTTP → HTTPS Redirect (all subdomains) ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name nobleport.com *.nobleport.com;
    return 301 https://$host$request_uri;
}

# ── ROOT: nobleport.com ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nobleport.com www.nobleport.com;

    # SSL (managed by Certbot / Cloudflare Origin Certs)
    ssl_certificate     /etc/letsencrypt/live/nobleport.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nobleport.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    include /etc/nginx/snippets/nobleport-security-headers.conf;

    # Redirect www to root
    if ($host = www.nobleport.com) {
        return 301 https://nobleport.com$request_uri;
    }

    location / {
        proxy_pass http://gateway_brain;
        include /etc/nginx/snippets/nobleport-proxy.conf;
    }
}

# ── API: api.nobleport.com ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.nobleport.com;

    ssl_certificate     /etc/letsencrypt/live/nobleport.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nobleport.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/nobleport-security-headers.conf;

    # API rate limiting
    limit_req zone=api_limit burst=50 nodelay;

    # CORS for API
    add_header Access-Control-Allow-Origin "https://app.nobleport.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Wallet-Address, X-zkSBT-Token" always;
    add_header Access-Control-Max-Age 86400 always;

    # Preflight
    location = /options {
        return 204;
    }

    # Auth endpoints (stricter rate limit)
    location /v1/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://gateway_brain;
        include /etc/nginx/snippets/nobleport-proxy.conf;
    }

    # zkSBT verification
    location /v1/zksbt/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://gateway_brain;
        include /etc/nginx/snippets/nobleport-proxy.conf;
    }

    # ENS resolution
    location /v1/ens/ {
        proxy_pass http://gateway_brain;
        include /etc/nginx/snippets/nobleport-proxy.conf;
        proxy_cache_valid 200 300s;
    }

    # General API
    location / {
        proxy_pass http://gateway_brain;
        include /etc/nginx/snippets/nobleport-proxy.conf;
    }

    # Health check (no rate limit)
    location /health {
        limit_req off;
        proxy_pass http://gateway_brain;
    }
}

# ── STREAM: stream.nobleport.com ─────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stream.nobleport.com;

    ssl_certificate     /etc/letsencrypt/live/nobleport.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nobleport.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/nobleport-security-headers.conf;

    # WebSocket upgrade for Stephanie.ai live streaming
    location /ws {
        limit_conn ws_conn 100;
        proxy_pass http://stephanie_stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # HLS/DASH streaming
    location /live {
        proxy_pass http://stephanie_stream;
        include /etc/nginx/snippets/nobleport-proxy.conf;
        proxy_buffering off;
        proxy_cache off;
    }

    location / {
        proxy_pass http://stephanie_stream;
        include /etc/nginx/snippets/nobleport-proxy.conf;
    }
}

# ── WEBSOCKET: ws.nobleport.com ──────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ws.nobleport.com;

    ssl_certificate     /etc/letsencrypt/live/nobleport.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nobleport.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        limit_conn ws_conn 200;
        proxy_pass http://websocket_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
