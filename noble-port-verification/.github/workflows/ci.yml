name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: noble-port-verification
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: noble-port-verification/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q

  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: noble-port-verification
    steps:
      - uses: actions/checkout@v4
      - name: Build & boot stack
        run: |
          cp .env.example .env
          docker compose up -d --build
      - name: Wait for /ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ready; then exit 0; fi
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Health probe
        run: curl -fsS http://localhost:8080/health
      - name: Tear down
        if: always()
        run: docker compose down -v
