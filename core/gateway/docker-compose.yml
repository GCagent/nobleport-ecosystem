services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: noble
      POSTGRES_PASSWORD: noble
      POSTGRES_DB: noble
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Migrations run in lexical order: 001 (workflow/audit) then 002 (mcp gateway).
      - ../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noble -d noble"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: ../..
      dockerfile: core/gateway/Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
